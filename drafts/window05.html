<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Grid Tiles</title>
</head>
<body style="margin: 0;">

    <div id="myTileContainer" style="position: relative; width: 100vw; height: 100vh;">
        
        <table style="border-collapse: collapse;">
            <tr>
                <td>
                    <div id="myTile1" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile1')" style="background: #ccc; cursor: move; user-select: none;">Tile 1</div>
                        <div style="height: calc(100% - 30px);">Content 1</div>
                        <div onmousedown="myStartResizing(event, 'myTile1')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
                <td>
                    <div id="myTile2" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile2')" style="background: #ccc; cursor: move; user-select: none;">Tile 2</div>
                        <div style="height: calc(100% - 30px);">Content 2</div>
                        <div onmousedown="myStartResizing(event, 'myTile2')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
                <td>
                    <div id="myTile3" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile3')" style="background: #ccc; cursor: move; user-select: none;">Tile 3</div>
                        <div style="height: calc(100% - 30px);">Content 3</div>
                        <div onmousedown="myStartResizing(event, 'myTile3')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div id="myTile4" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile4')" style="background: #ccc; cursor: move; user-select: none;">Tile 4</div>
                        <div style="height: calc(100% - 30px);">Content 4</div>
                        <div onmousedown="myStartResizing(event, 'myTile4')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
                <td>
                    <div id="myTile5" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile5')" style="background: #ccc; cursor: move; user-select: none;">Tile 5</div>
                        <div style="height: calc(100% - 30px);">Content 5</div>
                        <div onmousedown="myStartResizing(event, 'myTile5')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
                <td>
                    <div id="myTile6" style="position: relative; width: 150px; height: 100px; border: 1px solid black; background: white;">
                        <div onmousedown="myStartDragging(event, 'myTile6')" style="background: #ccc; cursor: move; user-select: none;">Tile 6</div>
                        <div style="height: calc(100% - 30px);">Content 6</div>
                        <div onmousedown="myStartResizing(event, 'myTile6')" style="width: 10px; height: 10px; background: black; cursor: nwse-resize; float: right;"></div>
                    </div>
                </td>
            </tr>
        </table>

    </div>

    <script>
        let myActiveElement = null;
        let myCurrentAction = null;
        let myMaxZIndex = 1;
        let myStartX, myStartY, myStartWidth, myStartHeight, myStartLeft, myStartTop;

        function myBringToFront(myElement) {
            myMaxZIndex++;
            myElement.style.zIndex = myMaxZIndex;
            
            if (myElement.style.position !== 'absolute') {
                const myRect = myElement.getBoundingClientRect();
                const myParentRect = document.getElementById('myTileContainer').getBoundingClientRect();
                
                myElement.style.left = (myRect.left - myParentRect.left) + "px";
                myElement.style.top = (myRect.top - myParentRect.top) + "px";
                myElement.style.position = 'absolute';
            }
        }

        async function myStartDragging(myEvent, myId) {
            myEvent.preventDefault();
            myActiveElement = document.getElementById(myId);
            myBringToFront(myActiveElement);
            myCurrentAction = 'drag';
            myStartX = myEvent.clientX;
            myStartY = myEvent.clientY;
            myStartLeft = parseInt(myActiveElement.style.left) || 0;
            myStartTop = parseInt(myActiveElement.style.top) || 0;
            window.onmousemove = myPerformAction;
            window.onmouseup = myStopAction;
        }

        async function myStartResizing(myEvent, myId) {
            myEvent.preventDefault();
            myActiveElement = document.getElementById(myId);
            myBringToFront(myActiveElement);
            myCurrentAction = 'resize';
            myStartX = myEvent.clientX;
            myStartY = myEvent.clientY;
            myStartWidth = parseInt(myActiveElement.style.width);
            myStartHeight = parseInt(myActiveElement.style.height);
            window.onmousemove = myPerformAction;
            window.onmouseup = myStopAction;
        }

        function myPerformAction(myEvent) {
            if (!myActiveElement) return;
            const myDeltaX = myEvent.clientX - myStartX;
            const myDeltaY = myEvent.clientY - myStartY;
            if (myCurrentAction === 'drag') {
                myActiveElement.style.left = (myStartLeft + myDeltaX) + "px";
                myActiveElement.style.top = (myStartTop + myDeltaY) + "px";
            } else if (myCurrentAction === 'resize') {
                myActiveElement.style.width = Math.max(50, myStartWidth + myDeltaX) + "px";
                myActiveElement.style.height = Math.max(50, myStartHeight + myDeltaY) + "px";
            }
        }

        function myStopAction() {
            myActiveElement = null;
            myCurrentAction = null;
            window.onmousemove = null;
            window.onmouseup = null;
        }
    </script>
</body>
</html>
